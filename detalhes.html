<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Imóvel | ImóveisTop</title>
    <style>
        :root {
            --primary: #ff385c;
            --dark: #222222;
            --gray: #717171;
            --border: #dddddd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #fff; color: var(--dark); padding-top: 80px; }

        /* Header Padrão */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            background: white;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 1000;
        }

        .logo { font-weight: 800; font-size: 20px; color: var(--primary); text-decoration: none; }
        
        .btn-voltar {
            background: var(--dark);
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-voltar:hover { opacity: 0.8; }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* Slider Principal */
        .slider-container {
            position: relative;
            width: 100%;
            height: 500px;
            background: #f7f7f7;
            border-radius: 12px;
            overflow: hidden;
        }
        .slider { display: flex; height: 100%; transition: transform 0.4s ease; }
        .slider img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; }

        /* Miniaturas */
        .thumbnails {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .thumb-item {
            width: 80px;
            height: 60px;
            border-radius: 6px;
            cursor: pointer;
            object-fit: cover;
            opacity: 0.6;
            border: 2px solid transparent;
        }
        .thumb-item.active { opacity: 1; border-color: var(--primary); }

        .info-section { margin-top: 30px; display: grid; grid-template-columns: 1fr 350px; gap: 40px; }
        
        .price-card {
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
            height: fit-content;
        }

        .map-box {
            margin-top: 40px;
            border-top: 1px solid var(--border);
            padding-top: 30px;
        }
        iframe { width: 100%; border-radius: 12px; border: none; height: 350px; }

        @media (max-width: 768px) {
            .info-section { grid-template-columns: 1fr; }
            .slider-container { height: 300px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">🏠 ImóveisTop</a>
        <a href="index.html" class="btn-voltar">Voltar</a>
    </header>

    <div class="container" id="conteudo-imovel">
        <p>Carregando imóvel incrível...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCmxZVNT7K8ZLV627XeKYRDJiViGw5OUCk",
            authDomain: "cadastrocasas-50f8a.firebaseapp.com",
            projectId: "cadastrocasas-50f8a",
            storageBucket: "cadastrocasas-50f8a.firebasestorage.app",
            messagingSenderId: "393041222159",
            appId: "1:393041222159:web:c064df3b250abdb340e17a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const idImovel = params.get('id');

        async function carregarDetalhes() {
            if (!idImovel) return;

            const docSnap = await getDoc(doc(db, "imoveis", idImovel));

            if (docSnap.exists()) {
                const im = docSnap.data();
                const fotos = im.fotos || [im.foto];
                
                let slides = fotos.map(url => `<img src="${url}">`).join('');
                let thumbs = fotos.map((url, i) => `<img src="${url}" class="thumb-item ${i===0?'active':''}" onclick="mudarSlide(${i})">`).join('');

                document.getElementById('conteudo-imovel').innerHTML = `
                    <div class="slider-container">
                        <div class="slider" id="mainSlider">${slides}</div>
                    </div>
                    <div class="thumbnails">${thumbs}</div>

                    <div class="info-section">
                        <div>
                            <h1 style="font-size: 32px; margin-bottom: 10px;">${im.titulo}</h1>
                            <p style="color: var(--gray); font-size: 18px; margin-bottom: 20px;">📍 ${im.endereco}</p>
                            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
                            <h3>Descrição</h3>
                            <p style="line-height: 1.6; color: #444; margin-top: 10px;">${im.descricao || 'Sem descrição.'}</p>
                        </div>
                        
                        <div class="price-card">
                            <p style="font-size: 24px; font-weight: 700;">R$ ${im.preco} <span style="font-weight: 400; font-size: 16px;">/ noite</span></p>
                            <button style="width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; margin-top: 20px; font-weight: bold; cursor: pointer;">Reservar Agora</button>
                        </div>
                    </div>

                    <div class="map-box">
                        <h3>Localização</h3>
                        <p style="margin-bottom: 15px; color: var(--gray);">Este é o local aproximado do imóvel.</p>
                        <iframe src="https://maps.google.com/maps?q=${encodeURIComponent(im.endereco)}&t=&z=15&ie=UTF8&iwloc=&output=embed"></iframe>
                    </div>
                `;
            }
        }

        // Função global para o clique na miniatura
        window.mudarSlide = (index) => {
            const slider = document.getElementById('mainSlider');
            const thumbs = document.querySelectorAll('.thumb-item');
            
            slider.style.transform = `translateX(-${index * 100}%)`;
            
            thumbs.forEach(t => t.classList.remove('active'));
            thumbs[index].classList.add('active');
        };

        carregarDetalhes();
    </script>
</body>
</html>
