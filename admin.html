<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Imóveis</title>
    <link rel="stylesheet" href="stylecadastro.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>

    <div class="container">
        <div class="form-box">
           <a href="index.html" style="text-decoration:none; color:#e74c3c; font-weight:bold;">⬅ Sair e Ver Vitrine</a> 
            <h2>🏠 Cadastrar / Editar Imóvel</h2>
            <form id="formCadastro">
                <label>Título do Anúncio</label>
                <input type="text" id="titulo" placeholder="Ex: Casa aconchegante no centro" required>

                <label>Preço da Diária (R$)</label>
                <input type="number" id="preco" placeholder="150" required>

                <label>Descrição</label>
                <textarea id="descricao" rows="4" placeholder="Conte detalhes sobre o espaço..."></textarea>
                
                <label>O que o imóvel oferece?</label>
                <div class="comodidades-grid">
                    <label class="check-item"><input type="checkbox" name="comodidade" value="Wi-Fi"> Wi-Fi</label>
                    <label class="check-item"><input type="checkbox" name="comodidade" value="Piscina"> Piscina</label>
                    <label class="check-item"><input type="checkbox" name="comodidade" value="Ar Condicionado"> Ar Condicionado</label>
                    <label class="check-item"><input type="checkbox" name="comodidade" value="Estacionamento"> Estacionamento</label>
                    <label class="check-item"><input type="checkbox" name="comodidade" value="Cozinha"> Cozinha</label>
                    <label class="check-item"><input type="checkbox" name="comodidade" value="Aceita Pets"> Pets</label>
                </div>

                <label>Link da Foto (URL)</label>
                <input type="url" id="fotoUrl" placeholder="https://exemplo.com/foto.jpg" required>

                <button type="submit" id="btnSalvar">Publicar Anúncio</button>
            </form>
        </div>

        <div class="admin-section">
            <hr>
            <h2>📋 Gerenciar Meus Imóveis</h2>
            <div id="listaGerenciamento" class="lista-admin">
                <!-- Os itens de gerenciamento aparecem aqui -->
                <p>Carregando lista...</p>
            </div>
        </div>
    </div>

    <script type="module" src="cadastro.js"></script>
</body>
</html>
